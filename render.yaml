# Render 部署配置文件
# 将此文件放在项目根目录（canteen-advisor/）

services:
  # 后端服务（FastAPI）
  - type: web
    name: canteen-advisor-api
    env: python
    region: oregon  # 可选：oregon, ohio, frankfurt, singapore
    plan: free  # 免费套餐
    
    # 构建命令
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    
    # 启动命令（使用 gunicorn）
    startCommand: |
      cd backend
      gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    
    # 环境变量
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: canteen-advisor-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app  # 修改为你的 Vercel 域名
      - key: DEBUG
        value: False
    
    # 健康检查路径
    healthCheckPath: /docs
    
    # 自动部署
    autoDeploy: true

# 数据库（PostgreSQL）
databases:
  - name: canteen-advisor-db
    databaseName: canteen_advisor
    user: canteen_admin
    plan: free  # 免费套餐（最多 1GB 存储）
